sigmaxim_import_export.export_node_type:
  path: '/admin/export/node/{node_type}'
  defaults:
    _controller: '\Drupal\sigmaxim_import_export\Controller\SigmaximExportController::exportNode'
    _title: 'Export Node'
  requirements:
    _permission: 'export entities'

sigmaxim_import_export.product_export:
  path: '/admin/structure/products/{sigmaxim_workflow_order_type}/export'
  defaults:
    _controller: '\Drupal\sigmaxim_import_export\Controller\SigmaximExportController::exportPage'
    _title: 'Export Product'
  requirements:
    _permission: 'export entities'

