sigmaxim_import_export.import_form:
  path: '/admin/structure/products/import'
  defaults:
    _form: '\Drupal\sigmaxim_import_export\Form\SigmaximImportForm'
    _title: 'Import Product'
  requirements:
    _permission: 'administer site configuration'

sigmaxim_import_export.process:
  path: '/admin/structure/products/import/process'
  defaults:
    _controller: '\Drupal\sigmaxim_import_export\Controller\SigmaximImportController::process'
  requirements:
    _permission: 'administer site configuration'
